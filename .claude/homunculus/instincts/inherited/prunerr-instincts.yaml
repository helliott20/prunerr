# Prunerr Workflow Feature Development With Follow Up Bugfix

## Action

Follow the feature-development-with-follow-up-bugfix workflow:
1. Implement new feature, updating backend logic, API routes, client components, and shared types.
2. Add or update scheduled tasks and service coordination logic.
3. Expose new data or controls in frontend settings and dashboard.
4. Update API health/status endpoints to reflect new feature state.
5. Shortly after, make a follow-up commit to fix bugs, tighten logic, or address review findings, touching many of the same files.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: client/src/components/Dashboard/Dashboard.tsx, client/src/components/Settings/Settings.tsx, client/src/types/index.ts

